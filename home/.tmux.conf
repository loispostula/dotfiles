#force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded!"
#reduce escape time
set-option -sg escape-time 0

set -g default-terminal "screen-256color"
set -g repeat-time 125
set -g base-index 1     # count from 1

# remap prefix to Alt + a
set -g prefix M-a
unbind C-b
bind M-a send-prefix


# Easy bindings for split
unbind %
bind & split-window -h
bind - split-window -v

# Change bindings for changing pane
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Allow to maximise a pane
bind-key = resize-pane -Z \; display-message "Zoom zoom zoom"

# Bad Wolf by Steve Losh
# # =====================
set -g status-fg white
set -g status-bg colour234
# # set -g status-bg default #set for transparent background
set -g window-status-activity-attr bold
set -g pane-border-fg colour245
set -g pane-active-border-fg colour39
set -g message-fg colour16
set -g message-bg colour221
set -g message-attr bold
# # Custom status bar
# # Powerline
set -g status-left-length 32
set -g status-right-length 150
set -g status-interval 5
# Lets add the current weather to our status bar—why? Well Why the french-toast not?
set -g status-left '#[fg=colour16,bg=colour254,bold] #S #[fg=colour254,bg=colour238,nobold]#[fg=colour15,bg=colour238,bold] #[fg=colour238,bg=colour234,nobold]'
set -g status-right '#[fg=colour245]❬ #(weathermajig Bruxelles)❬ %R ❬ %d %b #[fg=colour254,bg=colour234,nobold]#(rdio-current-track-tmux)#[fg=colour16,bg=colour254,bold] #h '
set -g window-status-format "#[fg=white,bg=colour234] #I #W "
set -g window-status-current-format "#[fg=colour234,bg=colour39]#[fg=colour16,bg=colour39,noreverse,bold] #I ❭ #W #[fg=colour39,bg=colour234,nobold]"
